services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - athleteshield

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: athleteshield
      POSTGRES_PASSWORD: athleteshield
      POSTGRES_DB: athleteshield
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athleteshield -d athleteshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athleteshield

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - athleteshield

  ai-service:
    build:
      context: ./services/ai-moderation
      dockerfile: Dockerfile
    environment:
      AI_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-replace-me}
    ports:
      - "8000:8000"
    networks:
      - athleteshield

volumes:
  postgres-data:
  redis-data:

networks:
  athleteshield:
    driver: bridge
