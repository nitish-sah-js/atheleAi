name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: athleteshield
          POSTGRES_PASSWORD: athleteshield
          POSTGRES_DB: athleteshield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: postgresql://athleteshield:athleteshield@localhost:5432/athleteshield_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-with-more-than-32-bytes
          DOCUMENT_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ED25519_PRIVATE_KEY_PEM_BASE64: ""
          ED25519_PUBLIC_KEY_PEM_BASE64: ""
